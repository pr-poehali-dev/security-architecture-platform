services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: security_arch
      POSTGRES_USER: sa_user
      POSTGRES_PASSWORD: sa_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/db-init/01_migrations.sh:/docker-entrypoint-initdb.d/01_migrations.sh:ro
      - ./db_migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sa_user -d security_arch"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-совместимое хранилище) ────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Создание bucket в MinIO ──────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/files &&
        mc anonymous set download local/files
      "

  # ── Backend: все функции в одном контейнере ──────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/webapp/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sa_user:sa_pass@db:5432/security_arch
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"

  # ── Frontend: Nginx со статической сборкой ───────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_ORG_DOMAINS_URL: http://localhost:8000/org-domains
        VITE_TECH_DOMAINS_URL: http://localhost:8000/tech-domains
        VITE_TECHNOLOGIES_URL: http://localhost:8000/technologies
        VITE_REQUIREMENTS_URL: http://localhost:8000/requirements
        VITE_DECISIONS_URL: http://localhost:8000/decisions
        VITE_HARDENING_URL: http://localhost:8000/hardening
        VITE_ARCH_TEMPLATES_URL: http://localhost:8000/arch-templates
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pg_data:
  minio_data:
