services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: security_arch
      POSTGRES_USER: sa_user
      POSTGRES_PASSWORD: sa_pass
    ports:
      - "5432:5432"
    volumes:

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sa_user -d security_arch"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-совместимое хранилище) ────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Создание bucket в MinIO ──────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/files &&
        mc anonymous set download local/files
      "

  # ── Backend: все функции в одном контейнере ──────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/webapp/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env.local
    ports:
      - "8000:8000"
    volumes:
      - ./backend/webapp:/app/backend

  # ── Frontend: Vite dev server с HMR ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env.local
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  pg_data:
  minio_data: